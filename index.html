// ─── LIGHTING ─────────────────────────────────────────────────────────────────
function applyLighting(flickers) {
  const TS=TW;
  lx.clearRect(0,0,lightCanvas.width,lightCanvas.height);
  lx.fillStyle='rgba(0,0,0,0.84)';lx.fillRect(0,0,lightCanvas.width,lightCanvas.height);
  lx.globalCompositeOperation='destination-out';
  let g;

  // All world coords converted to screen: sx = wx - camX, sy = wy - camY

  // Player light
  const plx=player.cx*TW-camX, ply=player.cy*TH-camY;
  g=lx.createRadialGradient(plx,ply,0,plx,ply,TS*5.5);
  g.addColorStop(0,'rgba(255,255,255,0.82)');g.addColorStop(.45,'rgba(255,255,255,0.38)');g.addColorStop(1,'rgba(0,0,0,0)');
  lx.fillStyle=g;lx.beginPath();lx.arc(plx,ply,TS*5.5,0,Math.PI*2);lx.fill();

  // Torches
  TORCHES.forEach(([tr,tc],i)=>{
    const tx=tc*TW+TW*.5-camX, ty=tr*TH+TH*.5-camY, radius=TS*(3.2+flickers[i]*.55);
    g=lx.createRadialGradient(tx,ty,0,tx,ty,radius);
    g.addColorStop(0,'rgba(255,210,110,0.92)');g.addColorStop(.38,'rgba(255,155,55,0.58)');
    g.addColorStop(.7,'rgba(200,75,18,0.22)');g.addColorStop(1,'rgba(0,0,0,0)');
    lx.fillStyle=g;lx.beginPath();lx.arc(tx,ty,radius,0,Math.PI*2);lx.fill();
  });

  // Door amber glow
  DOORS.forEach(door=>{
    if(door.unlocked) return;
    const dx=door.cx*TW+TW*.5-camX, dy=door.cy*TH+TH*.5-camY, dr=TS*1.8;
    g=lx.createRadialGradient(dx,dy,0,dx,dy,dr);
    g.addColorStop(0,'rgba(255,180,40,0.45)');g.addColorStop(1,'rgba(0,0,0,0)');
    lx.fillStyle=g;lx.beginPath();lx.arc(dx,dy,dr,0,Math.PI*2);lx.fill();
  });

  // Mystery box light
  {
    const spin=(box.state==='spinning');
    const bx=BOX_POS.cx*TW-camX, by=BOX_POS.cy*TH-camY, br=TS*(spin?3.5:2.2);
    g=lx.createRadialGradient(bx,by,0,bx,by,br);
    g.addColorStop(0,spin?'rgba(255,210,50,0.75)':'rgba(160,60,255,0.55)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    lx.fillStyle=g;lx.beginPath();lx.arc(bx,by,br,0,Math.PI*2);lx.fill();
  }

  // Bullets carry light
  projectiles.forEach(p=>{
    const bx=p.x-camX, by=p.y-camY;
    g=lx.createRadialGradient(bx,by,0,bx,by,TS*1.4);
    g.addColorStop(0,'rgba(150,220,255,0.65)');g.addColorStop(1,'rgba(0,0,0,0)');
    lx.fillStyle=g;lx.beginPath();lx.arc(bx,by,TS*1.4,0,Math.PI*2);lx.fill();
  });

  lx.globalCompositeOperation='source-over';
  ctx.drawImage(lightCanvas,0,0);

  // Warm torch tint
  ctx.save();
  TORCHES.forEach(([tr,tc],i)=>{
    const tx=tc*TW+TW*.5-camX, ty=tr*TH+TH*.5-camY, radius=TS*(2.2+flickers[i]*.3);
    g=ctx.createRadialGradient(tx,ty,0,tx,ty,radius);
    g.addColorStop(0,'rgba(255,175,55,0.14)');g.addColorStop(.55,'rgba(255,110,18,0.05)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(tx,ty,radius,0,Math.PI*2);ctx.fill();
  });
  ctx.restore();
}

// ─── MINIMAP ──────────────────────────────────────────────────────────────────
function drawMinimap() {
  const pad = 14;
  const barH = 14;
  // Fixed minimap size — never changes regardless of map dimensions
  const mmW = 160, mmH = 120;
  const mmX = pad - 6;
  const mmY = pad - 6;   // top-left, just below screen edge
  // Cell size scales so the full map always fits in the fixed box
  const cW = mmW / MAP_W, cH = mmH / MAP_H;

  ctx.save();

  // Outer background + border (fixed size)
  ctx.fillStyle = 'rgba(4,3,14,0.82)';
  roundRect(ctx, mmX, mmY, mmW, mmH + 14, 5, true, false);
  ctx.strokeStyle = 'rgba(80,60,140,0.55)'; ctx.lineWidth = 1;
  roundRect(ctx, mmX, mmY, mmW, mmH + 14, 5, false, true);

  // Label
  ctx.fillStyle = 'rgba(160,140,220,0.65)';
  ctx.font = `bold 8px Segoe UI`; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('MAP', mmX + 5, mmY + 3);

  const mapOffY = mmY + 12;   // tile grid starts here

  // Clip to map area
  ctx.beginPath(); ctx.rect(mmX, mapOffY, mmW, mmH); ctx.clip();

  // Draw tiles
  for (let r = 0; r < MAP_H; r++) {
    for (let c = 0; c < MAP_W; c++) {
      const t = MAP[r][c];
      const x = mmX + c * cW, y = mapOffY + r * cH;
      if (t === T.WALL) {
        ctx.fillStyle = '#0d0b1a'; ctx.fillRect(x, y, cW + .5, cH + .5);
      } else if (t === T.FLOOR || t === T.SPAWN) {
        ctx.fillStyle = t === T.SPAWN ? '#3a1010' : '#1e1a30';
        ctx.fillRect(x, y, cW + .5, cH + .5);
      } else if (t === T.PILLAR) {
        ctx.fillStyle = '#2a2040'; ctx.fillRect(x, y, cW + .5, cH + .5);
      } else if (t === T.DOOR) {
        ctx.fillStyle = '#5a2e10'; ctx.fillRect(x, y, cW + .5, cH + .5);
      }
    }
  }

  // Door markers (locked = amber glow)
  DOORS.forEach(door => {
    if (door.unlocked) return;
    door.tiles.forEach(({r, c}) => {
      ctx.fillStyle = 'rgba(255,180,40,0.7)';
      ctx.fillRect(mmX + c * cW, mapOffY + r * cH, cW + .5, cH + .5);
    });
  });

  // Torch dots
  TORCHES.forEach(([r, c]) => {
    ctx.fillStyle = 'rgba(255,160,40,0.4)';
    ctx.beginPath();
    ctx.arc(mmX + (c + .5) * cW, mapOffY + (r + .5) * cH, Math.max(1, cW * .6), 0, Math.PI * 2);
    ctx.fill();
  });

  // Zombies
  ZOMBIES.forEach(z => {
    if (z.dead) return;
    ctx.fillStyle = '#c83838';
    ctx.beginPath();
    ctx.arc(mmX + z.cx * cW, mapOffY + z.cy * cH, Math.max(1.2, cW * .7), 0, Math.PI * 2);
    ctx.fill();
  });

  // Shop marker
  ctx.fillStyle = '#44ccff';
  ctx.beginPath();
  ctx.arc(mmX + SHOP_POS.cx * cW, mapOffY + SHOP_POS.cy * cH, Math.max(1.5, cW * .8), 0, Math.PI * 2);
  ctx.fill();

  // Mystery box marker
  ctx.fillStyle = '#aa44ff';
  ctx.beginPath();
  ctx.arc(mmX + BOX_POS.cx * cW, mapOffY + BOX_POS.cy * cH, Math.max(1.5, cW * .8), 0, Math.PI * 2);
  ctx.fill();

  // Player dot (bright white with pulse)
  const pulse = Math.sin(performance.now() / 200) * .3 + .7;
  ctx.fillStyle = `rgba(255,255,255,${pulse})`;
  ctx.beginPath();
  ctx.arc(mmX + player.cx * cW, mapOffY + player.cy * cH, Math.max(2, cW * 1.1), 0, Math.PI * 2);
  ctx.fill();
  // Player direction indicator
  const facingAngles = {east:0,'south-east':Math.PI*.25,south:Math.PI*.5,'south-west':Math.PI*.75,
    west:Math.PI,'north-west':Math.PI*1.25,north:Math.PI*1.5,'north-east':Math.PI*1.75};
  const ang = facingAngles[player.facing] || 0;
  const pr = Math.max(2, cW * 1.1);
  ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mmX + player.cx * cW, mapOffY + player.cy * cH);
  ctx.lineTo(mmX + player.cx * cW + Math.cos(ang) * pr * 2.2, mapOffY + player.cy * cH + Math.sin(ang) * pr * 2.2);
  ctx.stroke();

  // Camera viewport rectangle
  const vx = mmX + (camX / TW) * cW;
  const vy = mapOffY + (camY / TH) * cH;
  const vw = (canvas.width / TW) * cW;
  const vh = (canvas.height / TH) * cH;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
  ctx.strokeRect(vx, vy, vw, vh);

  ctx.restore();
}

// ─── HUD ──────────────────────────────────────────────────────────────────────
const HUD_H = 72; // bottom bar height — used by minimap positioning too

function drawHUD() {
  const W = canvas.width, H = canvas.height;
  ctx.save();

  // ── Active perk banners (top-left) ──────────────
  const pad = 14;
  {
    const perksToShow = [
      { key:'doublePoints', label:'2×  GOLD', col:'#ffd700', bg:'rgba(80,50,0,0.85)'   },
      { key:'magnet',       label:'MAGNET',   col:'#60ccff', bg:'rgba(0,20,60,0.85)'   },
    ].filter(pd => activePerkTimers[pd.key] > 0);

    perksToShow.forEach((pd, i) => {
      const timer = activePerkTimers[pd.key];
      const frac  = timer / PERK_DURATION;
      const bx=pad, by=pad + i*42;
      const bw=130, bh=34;
      ctx.save();
      // bg pill
      ctx.fillStyle=pd.bg;
      roundRect(ctx,bx,by,bw,bh,6,true,false);
      ctx.strokeStyle=pd.col+'88'; ctx.lineWidth=1;
      roundRect(ctx,bx,by,bw,bh,6,false,true);
      // label
      ctx.fillStyle=pd.col; ctx.font='bold 13px Segoe UI';
      ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.shadowColor=pd.col; ctx.shadowBlur=6;
      ctx.fillText(pd.label, bx+10, by+bh*.38);
      // countdown bar
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(bx+6, by+bh*.68, bw-12, 5);
      ctx.fillStyle=pd.col; ctx.fillRect(bx+6, by+bh*.68, (bw-12)*frac, 5);
      // seconds remaining
      ctx.fillStyle='rgba(255,255,255,0.45)'; ctx.font='9px Segoe UI';
      ctx.textAlign='right'; ctx.textBaseline='middle';
      ctx.fillText(Math.ceil(timer/60)+'s', bx+bw-8, by+bh*.38);
      ctx.restore();
    });
  }

  // ── Round (top-center)
  ctx.fillStyle='rgba(0,0,0,0.55)';
  roundRect(ctx,W/2-65,pad-6,130,32,5,true,false);
  ctx.fillStyle='#c8a040'; ctx.font='bold 14px Segoe UI';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(`ROUND  ${game.round}`, W/2, pad+10);

  // ── Kills / score (top-right)
  ctx.fillStyle='rgba(0,0,0,0.55)';
  roundRect(ctx,W-172-pad,pad-6,176,32,5,true,false);
  ctx.fillStyle='#8888ee'; ctx.font='bold 12px Segoe UI';
  ctx.textAlign='right'; ctx.textBaseline='middle';
  ctx.fillText(`KILLS ${game.kills}   SCORE ${game.score}`, W-pad, pad+10);

  // ── Wave-clear overlay
  if (game.state==='wave_clear') {
    const prog=1-(game.waveTimer/180);
    const fadeIn=Math.min(1,prog*4), fadeOut=Math.max(0,1-(prog-.75)*4);
    ctx.globalAlpha=fadeIn*fadeOut;
    ctx.fillStyle='rgba(0,0,0,0.45)';
    roundRect(ctx,W/2-170,H/2-50,340,90,8,true,false);
    ctx.fillStyle='#a0e060'; ctx.font='bold 30px Segoe UI';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('WAVE CLEAR!',W/2,H/2-15);
    ctx.fillStyle='#888'; ctx.font='14px Segoe UI';
    ctx.fillText(`Round ${game.round+1} begins in ${Math.ceil(game.waveTimer/60)}…`,W/2,H/2+20);
    ctx.globalAlpha=1;
  }

  // ── Game over overlay
  if (game.state==='game_over') {
    if (!game.scoreSaved) { game.scoreSaved=true; saveScore(); }
    ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#c83838'; ctx.font=`bold ${Math.round(W*.04)}px Segoe UI`;
    ctx.fillText('GAME  OVER',W/2,H/2-50);
    ctx.fillStyle='#aaa'; ctx.font=`${Math.round(W*.016)}px Segoe UI`;
    ctx.fillText(`Round ${game.round}  •  Kills: ${game.kills}  •  Score: ${game.score}`,W/2,H/2+4);
    ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font=`${Math.round(W*.013)}px Segoe UI`;
    ctx.fillText('[R] Restart    [M] Main Menu',W/2,H/2+42);
  }

  // ── Bottom bar (LoL-style) ─────────────────────────────────────────────────
  {
    const BY = H - HUD_H;

    // Background
    ctx.fillStyle = 'rgba(5,3,16,0.94)';
    ctx.fillRect(0, BY, W, HUD_H);

    // Top border gradient
    const tb = ctx.createLinearGradient(0,0,W,0);
    tb.addColorStop(0,'rgba(60,40,120,0)');
    tb.addColorStop(0.25,'rgba(90,65,180,0.9)');
    tb.addColorStop(0.75,'rgba(90,65,180,0.9)');
    tb.addColorStop(1,'rgba(60,40,120,0)');
    ctx.fillStyle = tb; ctx.fillRect(0, BY, W, 1);

    const midY = BY + HUD_H / 2;
    const ipd = 18; // inner padding

    // helper: vertical divider
    function vDiv(x) {
      ctx.fillStyle = 'rgba(80,60,140,0.45)';
      ctx.fillRect(x, BY+8, 1, HUD_H-16);
    }

    // ── 1. HP section ─────────────────────────────
    const hpSecW = Math.min(230, W * 0.16);
    const hpX = ipd;
    const hf = Math.max(0, player.hp / player.maxHp);
    const hpColor = hf > 0.5 ? '#2ecc40' : hf > 0.25 ? '#e6c020' : '#e74c3c';

    ctx.fillStyle = 'rgba(160,140,220,0.55)';
    ctx.font = 'bold 9px Segoe UI'; ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('HEALTH', hpX, BY+10);

    const bx=hpX, by2=BY+22, bw=hpSecW-ipd, bh=16;
    // track
    ctx.fillStyle='#190808'; ctx.fillRect(bx,by2,bw,bh);
    // fill
    ctx.fillStyle=hpColor; ctx.fillRect(bx,by2,bw*hf,bh);
    // gloss
    ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(bx,by2,bw*hf,bh/3);
    // border
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
    ctx.strokeRect(bx,by2,bw,bh);
    // number
    ctx.fillStyle='#fff'; ctx.font='bold 10px Segoe UI';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`${player.hp} / ${player.maxHp}`, bx+bw/2, by2+bh/2);

    vDiv(hpSecW + ipd*1.5);

    // ── 2. Weapon slots (primary + secondary) ─────
    const wepX = hpSecW + ipd*3;
    const slotW = Math.min(150, W*0.10);
    const slotGap = 6;

    function drawWeaponSlot(slotX, wkey, ammo, isActive) {
      const sw = WEAPONS[wkey];
      const alpha = isActive ? 1 : 0.45;
      ctx.save(); ctx.globalAlpha = alpha;

      // slot background
      ctx.fillStyle = isActive ? sw.color+'28' : 'rgba(255,255,255,0.04)';
      roundRect(ctx, slotX, BY+8, slotW, HUD_H-16, 6, true, false);
      ctx.strokeStyle = isActive ? sw.color+'99' : 'rgba(80,70,120,0.5)';
      ctx.lineWidth = isActive ? 1.5 : 1;
      roundRect(ctx, slotX, BY+8, slotW, HUD_H-16, 6, false, true);

      // weapon name
      ctx.fillStyle = sw.color; ctx.font = `bold 11px Segoe UI`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(sw.name.toUpperCase(), slotX+slotW/2, BY+20);

      if (wkey === 'pistol') {
        // heat bar
        const heatFrac = player.heat / 100;
        const hbX = slotX+7, hbY = BY+30, hbW = slotW-14, hbH = 8;
        ctx.fillStyle = '#160808'; ctx.fillRect(hbX, hbY, hbW, hbH);
        if (heatFrac > 0) {
          const hCol = heatFrac < 0.5
            ? `hsl(${Math.round(120 - heatFrac*2*60)},88%,42%)`
            : `hsl(${Math.round(60  - (heatFrac-0.5)*2*60)},88%,42%)`;
          ctx.fillStyle = player.overheated ? '#ff2200' : hCol;
          ctx.fillRect(hbX, hbY, hbW * heatFrac, hbH);
          ctx.fillStyle='rgba(255,255,255,0.11)';
          ctx.fillRect(hbX, hbY, hbW * heatFrac, hbH/2);
        }
        ctx.strokeStyle = player.overheated ? '#ff5500' : 'rgba(255,255,255,0.08)';
        ctx.lineWidth=1; ctx.strokeRect(hbX, hbY, hbW, hbH);
        if (player.overheated) {
          ctx.fillStyle='#ff4400'; ctx.font='bold 8px Segoe UI';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('OVERHEATED', slotX+slotW/2, BY+46);
        } else {
          ctx.fillStyle='rgba(180,130,110,0.6)'; ctx.font='8px Segoe UI';
          ctx.textAlign='center'; ctx.textBaseline='middle';
          ctx.fillText('HEAT', slotX+slotW/2, BY+46);
        }
      } else {
        // ammo display — pips for ≤16, bar+number for larger counts
        const hbX = slotX+7, hbY = BY+30, hbW = slotW-14, hbH = 8;
        if (sw.ammoMax <= 16) {
          // pip row
          const pipAreaW = hbW, pw2 = Math.max(3, hbW/sw.ammoMax - 2), ph2 = hbH;
          const totalPipW = sw.ammoMax*(pw2+2)-2;
          const pipStartX = slotX + (slotW-totalPipW)/2;
          for (let k=0;k<sw.ammoMax;k++) {
            ctx.fillStyle = k<ammo ? sw.color : 'rgba(255,255,255,0.1)';
            ctx.fillRect(pipStartX+k*(pw2+2), hbY, pw2, ph2);
          }
        } else {
          // ammo bar
          const frac = ammo / sw.ammoMax;
          ctx.fillStyle = '#0d0d1a'; ctx.fillRect(hbX, hbY, hbW, hbH);
          ctx.fillStyle = ammo===0 ? '#ff3322' : sw.color;
          ctx.fillRect(hbX, hbY, hbW*frac, hbH);
          ctx.fillStyle='rgba(255,255,255,0.1)'; ctx.fillRect(hbX, hbY, hbW*frac, hbH/2);
          ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
          ctx.strokeRect(hbX, hbY, hbW, hbH);
        }
        ctx.fillStyle = ammo===0 ? '#ff4444' : 'rgba(200,200,200,0.65)';
        ctx.font='9px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(`${ammo} / ${sw.ammoMax}`, slotX+slotW/2, BY+47);
      }

      // [Q] swap hint on inactive secondary
      if (!isActive && wkey !== 'pistol') {
        ctx.fillStyle='rgba(180,180,180,0.4)'; ctx.font='8px Segoe UI';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText('[Q] swap', slotX+slotW/2, BY+HUD_H-4);
      }
      if (isActive) {
        ctx.fillStyle='rgba(180,180,180,0.35)'; ctx.font='8px Segoe UI';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(wkey==='pistol'?'[Q] swap':' [Q] pistol', slotX+slotW/2, BY+HUD_H-4);
      }
      ctx.restore();
    }

    const pistolActive = player.weaponKey === 'pistol';
    drawWeaponSlot(wepX, 'pistol', Infinity, pistolActive);

    if (player.secondaryKey) {
      const secX = wepX + slotW + slotGap;
      const secAmmo = pistolActive ? player.secondaryAmmo : player.ammo;
      drawWeaponSlot(secX, player.secondaryKey, secAmmo, !pistolActive);
      vDiv(secX + slotW + ipd);
    } else {
      // empty secondary slot hint
      ctx.save(); ctx.globalAlpha=0.25;
      roundRect(ctx, wepX+slotW+slotGap, BY+8, slotW, HUD_H-16, 6, false, true);
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
      roundRect(ctx, wepX+slotW+slotGap, BY+8, slotW, HUD_H-16, 6, false, true);
      ctx.fillStyle='#888'; ctx.font='9px Segoe UI';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('MYSTERY BOX', wepX+slotW+slotGap+slotW/2, BY+HUD_H/2-6);
      ctx.fillText('for secondary', wepX+slotW+slotGap+slotW/2, BY+HUD_H/2+6);
      ctx.restore();
      vDiv(wepX + slotW*2 + slotGap + ipd);
    }

    // ── 3. Stat tiles ─────────────────────────────
    const stats = [
      { icon:'⚔', label:'DAMAGE',    val:`+${player.upgrades.damage*20}%`,                                     col:'#ff7744', lvl:player.upgrades.damage    },
      { icon:'⚡', label:'ATK SPD',   val:`+${Math.round((1-Math.pow(0.85,player.upgrades.atkSpeed))*100)}%`,  col:'#ffdd44', lvl:player.upgrades.atkSpeed  },
      { icon:'★',  label:'CRIT',      val:`${player.upgrades.crit*10}%`,                                        col:'#bb44ff', lvl:player.upgrades.crit      },
      { icon:'👟', label:'MOV SPD',   val:`+${player.upgrades.moveSpeed*10}%`,                                  col:'#44ffaa', lvl:player.upgrades.moveSpeed },
      { icon:'❤',  label:'HP REGEN',  val:`${[0,2,5,8,11,15][player.upgrades.hpRegen]}/s`,                      col:'#ff4d6d', lvl:player.upgrades.hpRegen   },
    ];
    const statStartX = wepX + slotW*2 + slotGap + ipd*2.5;
    const statTileW  = Math.min(110, (W - statStartX - 160 - ipd*3) / stats.length);

    stats.forEach((s, i) => {
      const sx = statStartX + i * (statTileW + 6);
      const sy = BY + 8;
      const sh = HUD_H - 16;

      // tile bg
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      roundRect(ctx, sx, sy, statTileW, sh, 5, true, false);
      ctx.strokeStyle = s.lvl > 0 ? s.col+'44' : 'rgba(60,50,100,0.5)';
      ctx.lineWidth = 1;
      roundRect(ctx, sx, sy, statTileW, sh, 5, false, true);

      // icon
      ctx.font = '13px Segoe UI'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillStyle = s.col;
      ctx.fillText(s.icon, sx+7, sy+7);

      // label
      ctx.font = 'bold 8px Segoe UI'; ctx.fillStyle='rgba(180,170,210,0.6)';
      ctx.textAlign='right';
      ctx.fillText(s.label, sx+statTileW-6, sy+8);

      // value
      ctx.font = `bold 14px Segoe UI`; ctx.fillStyle = s.lvl>0 ? s.col : 'rgba(120,110,150,0.7)';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(s.val, sx+statTileW/2, BY+38);

      // level pips
      const segW=(statTileW-14)/5;
      for(let k=0;k<5;k++){
        ctx.fillStyle = k<s.lvl ? s.col : 'rgba(255,255,255,0.08)';
        ctx.fillRect(sx+7+k*(segW+1), BY+HUD_H-14, segW, 3);
      }
    });

    const afterStats = statStartX + stats.length*(statTileW+6) + ipd;
    vDiv(afterStats);

    // ── 4. Money ──────────────────────────────────
    const monX = afterStats + ipd;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 9px Segoe UI'; ctx.fillStyle='rgba(245,197,24,0.55)';
    ctx.fillText('GOLD', monX + 55, BY+16);
    ctx.font=`bold ${Math.round(HUD_H*.38)}px Segoe UI`;
    ctx.fillStyle='#f5c518';
    ctx.fillText(`$${player.money}`, monX+55, midY+4);
  }

  // ── Screen damage vignette
  if (player.hurtTimer>28) {
    const a=(player.hurtTimer-28)/17*.35;
    const gr=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.9);
    gr.addColorStop(0,'rgba(200,0,0,0)'); gr.addColorStop(1,`rgba(200,0,0,${a})`);
    ctx.fillStyle=gr; ctx.fillRect(0,0,W,H);
  }

  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r,fill,stroke) {
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
  if(fill)ctx.fill();
  if(stroke)ctx.stroke();
}

// ─── MULTIPLAYER ──────────────────────────────────────────────────────────────
const PLAYER_COLORS = ['#60c0ff','#ff6b6b','#6bff6b','#ffcc44'];
const mp = { socket:null, mode:null, room:null, slot:0, players:[] };
const REMOTE_PLAYERS = []; // up to 3 extra player objects (host-controlled on host, display-only on guest)
const guestInputs = {};    // host: slot -> latest input from that guest
let mpStateFrame = 0;
let hostState = null;      // guest: latest state from host

function mpPlayerColor(slot) { return PLAYER_COLORS[slot] || '#ffffff'; }

function createRemotePlayer(name, slot) {
  return {
    cx: PLAYER_START.cx + slot*1.5, cy: PLAYER_START.cy,
    facing:'south', frame:0, ft:0, moving:false, speed:PLAYER_SPEED,
    hp:100, maxHp:100, hurtTimer:0,
    dead:false, downed:false, downedTimer:0, reviveProgress:0,
    weaponKey:'pistol', ammo:Infinity, secondaryKey:null, secondaryAmmo:0,
    heat:0, overheated:false, shootCooldown:0,
    name, slot, color: mpPlayerColor(slot),
  };
}

// Called when local player HP hits 0
function playerGoDown() {
  if (player.downed || player.dead) return;
  if (mp.mode === null) {
    // Solo: just game over
    player.dead = true; game.state = 'game_over'; shopOpen = false; return;
  }
  player.downed = true; player.hp = 1;
  player.downedTimer = 1800; // 30s at 60fps
  shopOpen = false;
}

// Remote player goes down (host-side)
function remoteGoDown(rp) {
  if (rp.downed || rp.dead) return;
  rp.downed = true; rp.hp = 1; rp.downedTimer = 1800;
}

// Check if game over (all players dead/downed-and-expired in MP)
function checkMpGameOver() {
  if (mp.mode === null) return;
  const localOut = player.dead || (player.downed && player.downedTimer <= 0);
  const remoteOut = REMOTE_PLAYERS.every(r => r.dead || (r.downed && r.downedTimer <= 0));
  if (localOut && (REMOTE_PLAYERS.length === 0 || remoteOut)) {
    game.state = 'game_over'; shopOpen = false;
  }
}

// Update remote players on the host each frame
function updateRemotePlayers() {
  if (mp.mode !== 'host') return;
  REMOTE_PLAYERS.forEach(rp => {
    if (rp.dead) return;
    if (rp.downed) {
      rp.downedTimer--;
      if (rp.downedTimer <= 0) { rp.dead = true; rp.downed = false; }
      // Check if local player is near and holding F to revive
      const dist = Math.hypot(player.cx - rp.cx, player.cy - rp.cy);
      const inp = guestInputs[rp.slot];
      const localReviving = !player.dead && !player.downed && dist < 2.0 && keys['f'];
      const guestReviving = inp && inp.revive && !player.dead && !player.downed;
      if (localReviving || guestReviving) {
        rp.reviveProgress++;
        if (rp.reviveProgress >= 240) { // 4 seconds
          rp.downed = false; rp.hp = Math.ceil(rp.maxHp * 0.35);
          rp.reviveProgress = 0; rp.downedTimer = 0;
        }
      } else { rp.reviveProgress = Math.max(0, rp.reviveProgress - 2); }
      return;
    }
    rp.reviveProgress = 0;
    const inp = guestInputs[rp.slot];
    if (!inp) return;
    let dx=0, dy=0;
    if (inp.keys.w) dy-=1; if (inp.keys.s) dy+=1;
    if (inp.keys.a) dx-=1; if (inp.keys.d) dx+=1;
    if (dx||dy) {
      const len=Math.hypot(dx,dy)||1;
      const nx=rp.cx+(dx/len)*rp.speed, ny=rp.cy+(dy/len)*rp.speed;
      if(canWalk(nx,rp.cy)) rp.cx=nx;
      if(canWalk(rp.cx,ny)) rp.cy=ny;
      rp.moving=true; rp.facing=dir8(dx,dy);
      rp.ft++; if(rp.ft>=8){rp.ft=0;rp.frame=(rp.frame+1)%6;}
    } else { rp.moving=false; }
    if(rp.hurtTimer>0) rp.hurtTimer--;
    if(rp.shootCooldown>0) rp.shootCooldown--;
    if(inp.shooting && rp.shootCooldown<=0) {
      const w=WEAPONS[rp.weaponKey];
      rp.shootCooldown=w.fireRate;
      const ang=Math.atan2(inp.my-(rp.cy*TH), inp.mx-(rp.cx*TW));
      for(let p=0;p<w.pellets;p++){
        const a=ang+(Math.random()-0.5)*w.spread;
        projectiles.push({x:rp.cx*TW,y:rp.cy*TH,vx:Math.cos(a)*w.speed*TW*.06,vy:Math.sin(a)*w.speed*TW*.06,
          dmg:w.baseDmg,color:rp.color,trail:rp.color,life:90,pierce:w.pierce||false,
          prevX:rp.cx*TW,prevY:rp.cy*TH,owner:'remote'});
      }
    }
    if(inp.swap && !inp._swapLast) swapWeaponFor(rp);
    inp._swapLast = inp.swap;
  });
  // Check downed revive of local player by remote players
  if (player.downed) {
    player.downedTimer--;
    if (player.downedTimer <= 0) { player.dead = true; player.downed = false; }
    let anyReviving = false;
    REMOTE_PLAYERS.forEach(rp => {
      if (rp.dead || rp.downed) return;
      const dist = Math.hypot(rp.cx - player.cx, rp.cy - player.cy);
      const inp = guestInputs[rp.slot];
      if (inp && inp.revive && dist < 2.0) anyReviving = true;
    });
    if (!player.downed) return; // just died
    if (anyReviving) {
      player.reviveProgress++;
      if (player.reviveProgress >= 240) {
        player.downed = false; player.hp = Math.ceil(player.maxHp * 0.35);
        player.reviveProgress = 0; player.downedTimer = 0;
      }
    } else { player.reviveProgress = Math.max(0, player.reviveProgress - 2); }
    checkMpGameOver(); return;
  }
  // Also allow local player to revive themselves check is handled in local updatePlayer
}

function swapWeaponFor(rp) {
  if (!rp.secondaryKey) return;
  if (rp.weaponKey === 'pistol') {
    rp.weaponKey = rp.secondaryKey; rp.ammo = rp.secondaryAmmo;
  } else {
    rp.secondaryAmmo = rp.ammo; rp.weaponKey = 'pistol'; rp.ammo = Infinity;
  }
}

// Serialize entire game state (host → guests)
function serializeGameState() {
  const allP = [
    { cx:+player.cx.toFixed(2), cy:+player.cy.toFixed(2), hp:player.hp, mhp:player.maxHp,
      f:player.facing, fr:player.frame, mv:player.moving?1:0,
      dead:player.dead?1:0, dn:player.downed?1:0, dt:player.downedTimer,
      rvp:+(player.reviveProgress/240).toFixed(2),
      wk:player.weaponKey, am:player.ammo===Infinity?-1:player.ammo,
      nm:mp.players[0]?.name||'Host', sl:0 },
    ...REMOTE_PLAYERS.map(r=>({
      cx:+r.cx.toFixed(2), cy:+r.cy.toFixed(2), hp:r.hp, mhp:r.maxHp,
      f:r.facing, fr:r.frame, mv:r.moving?1:0,
      dead:r.dead?1:0, dn:r.downed?1:0, dt:r.downedTimer,
      rvp:+(r.reviveProgress/240).toFixed(2),
      wk:r.weaponKey, am:r.ammo===Infinity?-1:r.ammo,
      nm:r.name, sl:r.slot }))
  ];
  return {
    p: allP,
    z: ZOMBIES.filter(z=>!z.dead).map(z=>({cx:+z.cx.toFixed(1),cy:+z.cy.toFixed(1),hp:z.hp,mhp:z.maxHp,f:z.facing,fr:z.frame})),
    sk: SKELETONS.filter(s=>!s.dead).map(s=>({cx:+s.cx.toFixed(1),cy:+s.cy.toFixed(1),hp:s.hp,mhp:110,f:s.facing,fr:s.frame})),
    dr: DRAGONS.filter(d=>!d.dead).map(d=>({cx:+d.cx.toFixed(1),cy:+d.cy.toFixed(1),hp:d.hp,mhp:200,f:d.facing,fr:d.frame})),
    pr: projectiles.map(p=>({x:+p.x.toFixed(1),y:+p.y.toFixed(1),vx:+p.vx.toFixed(2),vy:+p.vy.toFixed(2),c:p.color,t:p.trail,l:p.life})),
    fl: FLAMES.map(f=>({x:+f.x.toFixed(1),y:+f.y.toFixed(1),vx:+f.vx.toFixed(2),vy:+f.vy.toFixed(2),l:f.life})),
    co: COINS.map(c=>({cx:+c.cx.toFixed(1),cy:+c.cy.toFixed(1),am:c.amount})),
    g: {r:game.round,k:game.kills,sc:game.score,st:game.state,mo:player.money,wt:game.waveTimer,sp:spawnRemaining}
  };
}

// Apply host state on guest client
function applyHostState(state) {
  hostState = state;
  // Update all remote players display
  REMOTE_PLAYERS.length = 0;
  state.p.forEach((pd, i) => {
    if (i === mp.slot) {
      // Update own position/state from host (authoritative)
      player.cx=pd.cx; player.cy=pd.cy; player.hp=pd.hp; player.maxHp=pd.mhp;
      player.facing=pd.f; player.frame=pd.fr; player.moving=!!pd.mv;
      player.dead=!!pd.dead; player.downed=!!pd.dn; player.downedTimer=pd.dt||0;
      player.reviveProgress=(pd.rvp||0)*240;
      player.weaponKey=pd.wk; player.ammo=pd.am===-1?Infinity:pd.am;
    } else {
      const rp = createRemotePlayer(pd.nm, pd.sl);
      rp.cx=pd.cx; rp.cy=pd.cy; rp.hp=pd.hp; rp.maxHp=pd.mhp;
      rp.facing=pd.f; rp.frame=pd.fr; rp.moving=!!pd.mv;
      rp.dead=!!pd.dead; rp.downed=!!pd.dn; rp.downedTimer=pd.dt||0;
      rp.reviveProgress=(pd.rvp||0)*240;
      rp.weaponKey=pd.wk;
      REMOTE_PLAYERS.push(rp);
    }
  });
  // Sync enemies — lerp positions to avoid teleport (α=0.4 snaps fast but smoothly)
  const LERP = 0.45;
  function syncArray(local, remote, factory) {
    // Remove excess
    while (local.length > remote.length) local.pop();
    remote.forEach((rd, i) => {
      if (!local[i]) { local[i] = factory(rd); return; }
      local[i].cx += (rd.cx - local[i].cx) * LERP;
      local[i].cy += (rd.cy - local[i].cy) * LERP;
      local[i].hp = rd.hp; local[i].facing = rd.f;
      local[i].dead = false;
    });
  }
  syncArray(ZOMBIES,   state.z,  z=>({cx:z.cx,cy:z.cy,hp:z.hp,maxHp:z.mhp||100,facing:z.f,frame:0,dead:false,hitFlash:0,deathTimer:0,_ft:0}));
  syncArray(SKELETONS, state.sk, s=>({cx:s.cx,cy:s.cy,hp:s.hp,maxHp:110,facing:s.f,frame:0,dead:false,hitFlash:0,deathTimer:0,_ft:0}));
  syncArray(DRAGONS,   state.dr, d=>({cx:d.cx,cy:d.cy,hp:d.hp,maxHp:200,facing:d.f,frame:0,dead:false,hitFlash:0,deathTimer:0,fireTimer:0,_ft:0}));
  // Projectiles: just replace (short-lived, lerping not needed)
  projectiles.length=0;
  state.pr.forEach(p=>projectiles.push({x:p.x,y:p.y,vx:p.vx,vy:p.vy,color:p.c,trail:p.t,life:p.l,prevX:p.x,prevY:p.y,dmg:0,pierce:false,owner:'remote'}));
  FLAMES.length=0;
  state.fl.forEach(f=>FLAMES.push({x:f.x,y:f.y,vx:f.vx,vy:f.vy,life:f.l}));
  // Coins: lerp positions
  syncArray(COINS, state.co, c=>({cx:c.cx,cy:c.cy,amount:c.am,bob:0}));
  COINS.forEach((c,i)=>{ if(state.co[i]) c.amount=state.co[i].am; });
  game.round=state.g.r; game.kills=state.g.k; game.score=state.g.sc;
  game.state=state.g.st; game.waveTimer=state.g.wt;
  spawnRemaining=state.g.sp||0; player.money=state.g.mo;
}

// Draw remote players (other players on screen)
function drawRemotePlayers() {
  REMOTE_PLAYERS.forEach(rp => {
    if (rp.dead) return;
    const px=rp.cx*TW, py=rp.cy*TH;
    const sz=TW*1.4;
    const frames = charWalk[rp.facing] || charWalk['south'];
    const fr = frames && frames[rp.frame % frames.length];
    if (fr && rp.moving) {
      ctx.drawImage(fr, px-sz/2, py-sz/2, sz, sz);
    } else if (charWalk[rp.facing] && charWalk[rp.facing][0]) {
      ctx.drawImage(charWalk[rp.facing][0], px-sz/2, py-sz/2, sz, sz);
    } else {
      ctx.fillStyle = rp.color; ctx.beginPath(); ctx.arc(px,py,TW*.35,0,Math.PI*2); ctx.fill();
    }
    // Name tag
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillStyle=rp.color; ctx.font=`bold ${Math.round(TW*.28)}px Segoe UI`;
    ctx.fillText(rp.name, px, py-sz*.55);
    // HP bar
    const bw=sz*.75, bh=Math.max(3,TH*.08), bx=px-bw/2, by=py-sz*.52;
    ctx.fillStyle='#300'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=rp.hp/rp.maxHp>0.5?'#2ecc40':rp.hp/rp.maxHp>0.25?'#e6c020':'#e74c3c';
    ctx.fillRect(bx,by,bw*(rp.hp/rp.maxHp),bh);
    // Downed state
    if (rp.downed) {
      ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#ff4444'; ctx.font=`bold ${Math.round(TW*.22)}px Segoe UI`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('DOWN', px, py);
      // Revive progress arc
      if (rp.reviveProgress>0) {
        ctx.strokeStyle='#00ffaa'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.arc(px,py,TW*.55,-Math.PI/2,-Math.PI/2+(Math.PI*2*(rp.reviveProgress/240)));
        ctx.stroke();
      }
    }
  });
  // Draw downed state for local player
  if (player.downed) {
    const px=player.cx*TW, py=player.cy*TH;
    ctx.fillStyle='rgba(255,50,50,0.18)';
    ctx.beginPath(); ctx.arc(px,py,TW*.55,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff4444'; ctx.font=`bold ${Math.round(TW*.26)}px Segoe UI`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('DOWN', px, py);
    if (player.reviveProgress>0) {
      ctx.strokeStyle='#00ffaa'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(px,py,TW*.7,-Math.PI/2,-Math.PI/2+(Math.PI*2*(player.reviveProgress/240)));
      ctx.stroke();
    }
  }
}

// Draw downed HUD overlay
function drawDownedHUD() {
  if (!player.downed) return;
  const W=canvas.width, H=canvas.height;
  // Red vignette
  const g=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.75);
  g.addColorStop(0,'rgba(180,0,0,0)'); g.addColorStop(1,'rgba(180,0,0,0.55)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // Text
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle='#ff4444'; ctx.font=`bold ${Math.round(W*.035)}px Segoe UI`;
  ctx.fillText('YOU ARE DOWN', W/2, H/2-40);
  ctx.fillStyle='#ffaaaa'; ctx.font=`${Math.round(W*.016)}px Segoe UI`;
  const secs=Math.ceil(player.downedTimer/60);
  ctx.fillText(`A teammate can revive you — ${secs}s remaining`, W/2, H/2+4);
  // Revive progress bar
  if (player.reviveProgress>0) {
    const bw=280, bh=12, bx=W/2-bw/2, by=H/2+34;
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle='#00ffaa'; ctx.fillRect(bx,by,bw*(player.reviveProgress/240),bh);
    ctx.fillStyle='#00ffaa'; ctx.font=`${Math.round(W*.013)}px Segoe UI`;
    ctx.fillText('Being revived...', W/2, by+bh+14);
  }
}

// Send input from guest to server
function sendGuestInput() {
  if (!mp.socket || mp.mode !== 'guest') return;
  mp.socket.emit('player_input', {
    keys: { w:!!(keys['w']||keys['arrowup']), s:!!(keys['s']||keys['arrowdown']),
            a:!!(keys['a']||keys['arrowleft']), d:!!(keys['d']||keys['arrowright']) },
    mx: (mouse.x + camX), my: (mouse.y + camY),
    shooting: !!mouse.down,
    swap: !!(keys['q']),
    revive: !!(keys['f']),
  });
}

// ── Socket.io connection & room UI ───────────────────────────────────────────
function mpConnect(cb) {
  if (mp.socket && mp.socket.connected) { cb(); return; }
  mp.socket = io(API_URL, { transports:['websocket','polling'] });
  mp.socket.on('connect', cb);
  mp.socket.on('mp_error', msg => { document.getElementById('mpMsg').textContent = msg; });
  mp.socket.on('host_left', () => {
    alert('The host disconnected. Returning to menu.'); mpClose(); goToMenu();
  });
  mp.socket.on('lobby_update', players => {
    mp.players = players; renderMpLobby();
  });
  mp.socket.on('player_left', ({ slot }) => {
    REMOTE_PLAYERS.splice(REMOTE_PLAYERS.findIndex(r=>r.slot===slot), 1);
  });
  mp.socket.on('game_start', players => {
    mp.players = players;
    // Build remote player objects
    REMOTE_PLAYERS.length = 0;
    players.forEach(p => { if(p.slot !== mp.slot) REMOTE_PLAYERS.push(createRemotePlayer(p.name, p.slot)); });
    closeModal('mpModal');
    startGame();
  });
  mp.socket.on('game_state', state => { if(mp.mode==='guest') applyHostState(state); });
  mp.socket.on('player_input', inp => {
    if (mp.mode==='host') guestInputs[inp.slot] = inp;
  });
}

function mpCreate() {
  const u = getUser();
  const name = u ? u.username : ('Player' + Math.floor(Math.random()*999));
  document.getElementById('mpMsg').textContent = '';
  mpConnect(() => {
    mp.mode = 'host'; mp.slot = 0;
    mp.socket.emit('create_room', { name });
    mp.socket.once('room_created', ({ code, slot, players }) => {
      mp.room = code; mp.slot = slot; mp.players = players;
      document.getElementById('mpLobbySetup').style.display='none';
      document.getElementById('mpLobbyRoom').style.display='block';
      document.getElementById('mpRoomCode').textContent = code;
      document.getElementById('mpStartBtn').style.display='block';
      document.getElementById('mpWaitMsg').style.display='none';
      renderMpLobby();
    });
  });
}

function mpJoin() {
  const code = document.getElementById('mpJoinCode').value.trim().toUpperCase();
  if (!code) { document.getElementById('mpMsg').textContent='Enter a room code'; return; }
  const u = getUser();
  const name = u ? u.username : ('Player' + Math.floor(Math.random()*999));
  document.getElementById('mpMsg').textContent='';
  mpConnect(() => {
    mp.mode = 'guest'; mp.socket.emit('join_room', { code, name });
    mp.socket.once('room_joined', ({ code:c, slot, players }) => {
      mp.room = c; mp.slot = slot; mp.players = players;
      document.getElementById('mpLobbySetup').style.display='none';
      document.getElementById('mpLobbyRoom').style.display='block';
      document.getElementById('mpRoomCode').textContent = c;
      document.getElementById('mpStartBtn').style.display='none';
      document.getElementById('mpWaitMsg').style.display='block';
      renderMpLobby();
    });
  });
}

function mpStartGame() {
  if (mp.mode !== 'host' || !mp.socket) return;
  mp.socket.emit('start_game');
}

function mpClose() {
  document.getElementById('mpLobbySetup').style.display='block';
  document.getElementById('mpLobbyRoom').style.display='none';
  document.getElementById('mpMsg').textContent='';
  if (mp.socket) { mp.socket.disconnect(); mp.socket=null; }
  mp.mode=null; mp.room=null; mp.slot=0; mp.players=[];
  REMOTE_PLAYERS.length=0;
  closeModal('mpModal');
}

function renderMpLobby() {
  const list = document.getElementById('mpPlayerList');
  list.innerHTML = mp.players.map(p=>`
    <div class="mp-player-row">
      <div class="mp-dot" style="background:${mpPlayerColor(p.slot)}"></div>
      <div class="mp-pname">${p.name}</div>
      ${p.slot===0?'<div class="mp-host-badge">HOST</div>':''}
    </div>`).join('');
}

// Guest-side local physics — runs every frame to keep rendering smooth between host state updates
function guestLocalPhysics() {
  // Move projectiles forward locally
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.prevX = p.x; p.prevY = p.y;
    p.x += p.vx; p.y += p.vy;
    p.life--;
    if (p.life <= 0) { projectiles.splice(i, 1); continue; }
    const tr = Math.floor(p.y / TH), tc = Math.floor(p.x / TW);
    if (tr < 0 || tr >= MAP_H || tc < 0 || tc >= MAP_W || MAP[tr]?.[tc] === T.WALL || MAP[tr]?.[tc] === T.PILLAR) {
      projectiles.splice(i, 1);
    }
  }
  // Move flames forward locally
  for (let i = FLAMES.length - 1; i >= 0; i--) {
    const f = FLAMES[i]; f.x += f.vx; f.y += f.vy; f.life--;
    if (f.life <= 0) FLAMES.splice(i, 1);
  }
  // Animate enemy frames locally (so they don't freeze)
  ZOMBIES.forEach(z => { z._ft=(z._ft||0)+1; if(z._ft>=8){z._ft=0;z.frame=(z.frame+1)%8;} });
  SKELETONS.forEach(s => { s._ft=(s._ft||0)+1; if(s._ft>=6){s._ft=0;s.frame=(s.frame+1)%4;} });
  DRAGONS.forEach(d => { d._ft=(d._ft||0)+1; if(d._ft>=8){d._ft=0;d.frame=(d.frame+1)%8;} });
  // Bob coins
  COINS.forEach(c => { c.bob=(c.bob||0)+0.08; });
  // Tick perks/effects
  Object.keys(activePerkTimers).forEach(k => { if(activePerkTimers[k]>0) activePerkTimers[k]--; });
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────────
let t = 0;
let gameStarted = false; // true once player clicks PLAY
const TARGET_FPS = 60;
const FRAME_MS = 1000 / TARGET_FPS;
let lastFrameTime = 0;

function render(now) {
  requestAnimationFrame(render);
  if (now - lastFrameTime < FRAME_MS) return;
  lastFrameTime = now - ((now - lastFrameTime) % FRAME_MS);
  t += 0.04;
  if (!gameStarted) { return; }

  // ── Logic ────────────────────────────────────────────────────────────────────
  if (mp.mode === 'guest') {
    // Send input every frame for responsive feel
    sendGuestInput();
    // Run local physics between host state corrections (dead reckoning)
    updateCamera();
    guestLocalPhysics();
    updateDmgNums();
    updateEffects();
  } else {
    updateCamera();
    updatePlayer();
    tryShoot();
    updateRemotePlayers();
    updateZombies();
    updateSkeletons();
    updateDragons();
    updateFlames();
    updateProjectiles();
    updateDmgNums();
    updateCoins();
    updatePerks();
    updateBox();
    updateEffects();
    updateWave();
    if (mp.mode === 'host') {
      mpStateFrame++;
      if (mpStateFrame >= 2) {
        mpStateFrame = 0;
        mp.socket.emit('game_state', serializeGameState());
      }
    }
  }

  // ── Fill background ───────────────────────────────────────────────────────────
  ctx.fillStyle = '#0c0b12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── World rendering (camera transform) ───────────────────────────────────────
  ctx.save();
  ctx.translate(-camX, -camY);

  for (let r=0;r<MAP_H;r++) for (let c=0;c<MAP_W;c++) {
    const type=MAP[r][c];
    if      (type===T.WALL)   drawWall(r,c);
    else if (type===T.PILLAR) drawPillar(r,c);
    else if (type===T.DOOR)   drawDoor(r,c);
    else                      drawFloor(r,c,type);
  }
  drawWallShadows();
  drawDoorPrompts();

  // Torches
  const flickers=TORCHES.map((_,i)=>Math.sin(t*2.8+i*1.87)*.5+.5);
  TORCHES.forEach(([r,c],i)=>drawTorch(r,c,flickers[i]));

  // Entities — Y-sorted
  drawFlames();
  const entities=[
    {y:player.cy*TH, draw:drawPlayer},
    ...ZOMBIES.map(z=>({y:z.cy*TH, draw:()=>drawZombie(z)})),
    ...SKELETONS.map(s=>({y:s.cy*TH, draw:()=>drawSkeleton(s)})),
    ...DRAGONS.map(d=>({y:d.cy*TH, draw:()=>drawDragon(d)})),
    ...REMOTE_PLAYERS.map(r=>({y:r.cy*TH, draw:()=>{}})) // positions for sort only
  ];
  entities.sort((a,b)=>a.y-b.y).forEach(e=>e.draw());
  drawRemotePlayers();

  // World-space interactables
  drawClickIndicator();
  drawShopMarker();
  drawAmmoStation();
  drawDevChest();
  drawMysteryBox();
  drawCoins();
  drawPerks();
  drawEffects();
  drawProjectiles();

  ctx.restore(); // end camera transform

  // ── Screen-space overlays ─────────────────────────────────────────────────────
  applyLighting(flickers);
  drawDmgNums();
  drawHUD();
  drawMinimap();
  drawShopUI();
  drawDownedHUD();
  drawCursor();

}

render(0);

// ▸ Set this to your Railway deployment URL once deployed
// ▸ For local testing keep it as http://localhost:3000
const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'https://zombiez-production.up.railway.app';

// ── Core helpers ──────────────────────────────────────────────────────────────
function getToken()  { return localStorage.getItem('deadsurge_token'); }
function getUser()   { try { return JSON.parse(localStorage.getItem('deadsurge_authuser')); } catch { return null; } }
function setSession(token, user) {
  localStorage.setItem('deadsurge_token', token);
  localStorage.setItem('deadsurge_authuser', JSON.stringify(user));
}
function clearSession() {
  localStorage.removeItem('deadsurge_token');
  localStorage.removeItem('deadsurge_authuser');
}

async function apiPost(path, body, token) {
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API_URL + path, { method: 'POST', headers, body: JSON.stringify(body) });
  return { ok: r.ok, data: await r.json() };
}
async function apiGet(path, token) {
  const headers = {};
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const r = await fetch(API_URL + path, { headers });
  return { ok: r.ok, data: await r.json() };
}

// ── Game flow ─────────────────────────────────────────────────────────────────
function startGame() {
  resumeAudio();
  document.getElementById('menu').style.display = 'none';
  document.body.style.cursor = 'none';
  if (!gameStarted) { gameStarted = true; startWave(1); }
}

function goToMenu() {
  document.getElementById('menu').style.display = 'flex';
  document.body.style.cursor = 'default';
  menuBgLoop();
  refreshLeaderboard();
  updateLoginLabel();
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openModal(id) {
  if (id === 'lbModal')    refreshLeaderboard();
  if (id === 'loginModal') renderAuthModal();
  document.getElementById(id).style.display = 'flex';
}
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.querySelectorAll('.modal-ov').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.style.display = 'none'; });
});

// ── Auth modal ────────────────────────────────────────────────────────────────
function renderAuthModal() {
  const user = getUser();
  document.getElementById('authLoggedIn').style.display = user ? 'block' : 'none';
  document.getElementById('authForms').style.display     = user ? 'none'  : 'block';
  if (user) {
    document.getElementById('authUsername').textContent = user.username;
    document.getElementById('authEmail').textContent    = user.email;
  }
  clearAuthErrors();
}

function switchTab(tab) {
  document.getElementById('formLogin').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('formRegister').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabReg').classList.toggle('active',   tab==='register');
  clearAuthErrors();
}
function clearAuthErrors() {
  document.getElementById('liError').textContent  = '';
  document.getElementById('regError').textContent = '';
}

async function doLogin() {
  const email    = document.getElementById('liEmail').value.trim();
  const password = document.getElementById('liPassword').value;
  const errEl    = document.getElementById('liError');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
  errEl.textContent = 'Logging in…';
  try {
    const { ok, data } = await apiPost('/api/login', { email, password });
    if (!ok) { errEl.textContent = data.error || 'Login failed.'; return; }
    setSession(data.token, data.user);
    updateLoginLabel();
    renderAuthModal();
    closeModal('loginModal');
  } catch { errEl.textContent = 'Cannot reach server. Is it running?'; }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const email    = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const errEl    = document.getElementById('regError');
  errEl.textContent = '';
  if (!username || !email || !password) { errEl.textContent = 'Please fill in all fields.'; return; }
  errEl.textContent = 'Creating account…';
  try {
    const { ok, data } = await apiPost('/api/register', { username, email, password });
    if (!ok) { errEl.textContent = data.error || 'Registration failed.'; return; }
    setSession(data.token, data.user);
    updateLoginLabel();
    renderAuthModal();
    closeModal('loginModal');
  } catch { errEl.textContent = 'Cannot reach server. Is it running?'; }
}

function logout() {
  clearSession();
  updateLoginLabel();
  renderAuthModal();
}

function updateLoginLabel() {
  const u = getUser();
  document.getElementById('loginLabel').textContent = u ? u.username : 'Login';
}

// ── Score saving ──────────────────────────────────────────────────────────────
async function saveScore() {
  const token = getToken();
  const payload = {
    round: game.round, kills: game.kills,
    gold:  player.goldEarned || 0, score: game.score
  };
  // Always save to localStorage as fallback
  let lb = JSON.parse(localStorage.getItem('deadsurge_lb_local') || '[]');
  const u = getUser();
  lb.push({ name: u ? u.username : 'Guest', ...payload, date: new Date().toLocaleDateString() });
  lb.sort((a,b) => b.round - a.round || b.kills - a.kills || b.score - a.score);
  localStorage.setItem('deadsurge_lb_local', JSON.stringify(lb.slice(0,20)));
  // Also post to API if logged in
  if (token) {
    try { await apiPost('/api/scores', payload, token); } catch {}
  }
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
async function refreshLeaderboard() {
  const el = document.getElementById('lbContent');
  el.innerHTML = '<div class="lb-empty">Loading…</div>';

  let rows = [];
  try {
    const { ok, data } = await apiGet('/api/leaderboard');
    if (ok && Array.isArray(data)) rows = data;
  } catch {
    // Fallback to local storage
    rows = (JSON.parse(localStorage.getItem('deadsurge_lb_local') || '[]'))
      .map(e => ({ username: e.name, round: e.round, kills: e.kills, gold: e.gold, score: e.score, date: e.date }));
  }

  if (!rows.length) { el.innerHTML = '<div class="lb-empty">No scores yet — be the first!</div>'; return; }
  const med = ['gold','silver','bronze'];
  el.innerHTML = `<table class="lb-tbl">
    <tr><th>#</th><th>Player</th><th>Round</th><th>Kills</th><th>Gold</th><th>Score</th><th>Date</th></tr>
    ${rows.map((r,i) => `<tr class="${med[i]||''}">
      <td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
      <td>${r.username||r.name}</td>
      <td>${r.round}</td><td>${r.kills}</td><td>$${r.gold}</td><td>${r.score}</td>
      <td style="font-size:11px;color:rgba(255,255,255,.35)">${r.date||''}</td>
    </tr>`).join('')}
  </table>`;
}

// ── Volume / Fullscreen ───────────────────────────────────────────────────────
function setMasterVol(v) {
  masterGain.gain.value = v / 100;
  document.getElementById('volVal').textContent = v + '%';
  localStorage.setItem('deadsurge_vol', v);
}
function toggleFS() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// ── Animated menu background ──────────────────────────────────────────────────
const menuParticles = Array.from({length:72}, () => ({
  x: Math.random(), y: Math.random(),
  r: 0.7 + Math.random() * 2,
  vx: (Math.random()-.5) * 0.00011,
  vy: -0.00006 - Math.random() * 0.00016,
  a: Math.random() * Math.PI * 2,
  col: Math.random()<.38 ? 'rgba(180,0,0,' : Math.random()<.5 ? 'rgba(90,40,170,' : 'rgba(255,255,255,'
}));
let menuBgRunning = false;
function menuBgLoop() {
  if (menuBgRunning) return;
  menuBgRunning = true;
  const mc = document.getElementById('menuBg');
  const mx = mc.getContext('2d');
  function draw() {
    if (document.getElementById('menu').style.display === 'none') { menuBgRunning=false; return; }
    mc.width = window.innerWidth; mc.height = window.innerHeight;
    const g = mx.createRadialGradient(mc.width*.5,mc.height*.55,0,mc.width*.5,mc.height*.5,mc.width*.75);
    g.addColorStop(0,'#130922'); g.addColorStop(.5,'#0a0618'); g.addColorStop(1,'#060410');
    mx.fillStyle=g; mx.fillRect(0,0,mc.width,mc.height);
    menuParticles.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.a+=0.009;
      if(p.y<-0.02){p.y=1.02;p.x=Math.random();}
      mx.beginPath(); mx.arc(p.x*mc.width,p.y*mc.height,p.r,0,Math.PI*2);
      mx.fillStyle=p.col+((Math.sin(p.a)*.5+.5)*.5)+')'; mx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(function boot() {
  updateLoginLabel();
  const sv = localStorage.getItem('deadsurge_vol');
  if (sv !== null) { document.getElementById('volSlider').value=sv; setMasterVol(sv); }
  menuBgLoop();
})();
</script>
